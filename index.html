<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카이 앱스토어 (Kai AppStore)</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1e1e1e;
            --primary-blue: #2196F3;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid var(--primary-blue);
            margin-bottom: 30px;
        }

        .admin-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 1px dashed #444;
        }

        h2 { color: var(--primary-blue); }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .file-label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #ccc;
            font-size: 0.9em;
        }

        button {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #444;
            display: block;
            margin-bottom: 15px;
            background-size: cover;
            background-position: center;
        }

        .update-box {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-top: 10px;
            border-left: 4px solid var(--primary-blue);
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 카이 앱스토어</h1>
    <p>나이 제한 없는 개발자들의 놀이터</p>
</header>

<div class="admin-panel">
    <h2>🆕 새 앱 등록하기</h2>
    <input type="text" id="appName" placeholder="앱 이름 (예: 미니 디시)">
    <input type="text" id="appVersion" placeholder="업데이트 버전 (예: v1.0.2)">
    <textarea id="appDesc" placeholder="기능 설명 (어떤 앱인가요?)"></textarea>
    <textarea id="appUpdate" placeholder="업데이트 내용 (무엇이 바뀌었나요?)"></textarea>
    
    <span class="file-label">아이콘 이미지:</span>
    <input type="file" id="iconFile" accept="image/*">
    
    <span class="file-label">APK 파일 (반드시 '파일' 또는 '내 파일' 앱 선택):</span>
    <input type="file" id="apkFile" accept="*/*">
    
    <button onclick="addApp()">스토어에 등록하기</button>
</div>

<hr>

<h2>🔥 인기 앱 리스트</h2>
<div class="app-list" id="appList"></div>

<script>
    function addApp() {
        const name = document.getElementById('appName').value;
        const version = document.getElementById('appVersion').value;
        const desc = document.getElementById('appDesc').value;
        const update = document.getElementById('appUpdate').value;
        const iconFile = document.getElementById('iconFile').files[0];
        
        if(!name) { alert("앱 이름을 입력해주세요!"); return; }

        const appList = document.getElementById('appList');
        const card = document.createElement('div');
        card.className = 'app-card';
        
        // 아이콘 이미지 미리보기 처리
        let iconHtml = '<div class="app-icon"></div>';
        if (iconFile) {
            const iconUrl = URL.createObjectURL(iconFile);
            iconHtml = `<div class="app-icon" style="background-image: url('${iconUrl}')"></div>`;
        }
        
        card.innerHTML = `
            <div style="display:flex; align-items:center; gap:15px;">
                ${iconHtml}
                <div>
                    <h3 style="margin:0">${name}</h3>
                    <span style="font-size:0.8em; color:#888;">${version}</span>
                </div>
            </div>
            <p>${desc}</p>
            <div class="update-box">
                <strong>What's New:</strong><br>
                ${update}
            </div>
            <button style="margin-top:15px; background:#4CAF50;">다운로드 (.APK)</button>
        `;
        
        appList.prepend(card);
        
        // 입력창 초기화
        document.getElementById('appName').value = "";
        document.getElementById('appDesc').value = "";
        document.getElementById('appUpdate').value = "";
        document.getElementById('appVersion').value = "";
    }
</script>

</body>
</html>
